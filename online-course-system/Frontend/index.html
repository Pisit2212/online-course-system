<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Course | หน้าแรก</title>

    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>

    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --bg-color: #f8f9fa;
            --text-muted: #7f8c8d;
            --white: #ffffff;
            --radius: 15px;
        }

        * {
            font-family: 'Anuphan', sans-serif !important;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--secondary-color);
            line-height: 1.6;
        }

        /* --- Navbar --- */
        nav {
            background: var(--white);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            gap: 12px;
        }

        .btn-nav {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-home {
            background: var(--primary-color);
            color: white;
        }

        .btn-my-course {
            background: #ecf0f1;
            color: var(--secondary-color);
        }

        .btn-logout {
            background: #ff7675;
            color: white;
            margin-left: 15px;
        }

        .btn-nav:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-section h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        #courseList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        #instructorPanel {
            background: var(--white);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-top: 60px;
            border-top: 5px solid var(--primary-color);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            margin-bottom: 25px;
            color: var(--primary-color);
        }

        input,
        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn-action {
            padding: 15px 25px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn-create {
            background: #2ecc71;
            color: white;
        }

        .btn-update {
            background: #f39c12;
            color: white;
        }

        .course-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .course-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-left">
            <button onclick="window.location.href='index.html'" class="btn-nav btn-home">
                 หน้าแรก
            </button>
            <button onclick="window.location.href='my-courses.html'" class="btn-nav btn-my-course">
                 คอร์สของฉัน
            </button>
        </div>

        <div style="display: flex; align-items: center;">
            <span id="navUserName" style="font-weight: 600; color: var(--primary-color);"></span>
            <button onclick="logout()" class="btn-nav btn-logout">
                 ออกจากระบบ
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-section">
            <h1>สำรวจคอร์สเรียนที่น่าสนใจ</h1>
            <p style="color: var(--text-muted);">เริ่มต้นเส้นทางการเรียนรู้ของคุณได้แล้ววันนี้</p>
        </div>

        <div id="courseList">
            <p style="text-align: center; color: var(--text-muted);">กำลังโหลดคอร์สเรียน...</p>
        </div>

        <div id="instructorPanel" style="display: none;">
            <div class="panel-title">
                <span>เครื่องมือผู้สอน: จัดการคอร์ส</span>
            </div>

            <div style="display: flex; flex-direction: column;">
                <input id="title" placeholder="ชื่อคอร์ส (Course Title)">
                <textarea id="description" placeholder="รายละเอียดคอร์ส (Course Description)"></textarea>

                <div style="display: flex; gap: 10px;">
                    <button onclick="createCourse()" class="btn-action btn-create" style="flex: 1;">
                        <i class="fa-solid fa-plus"></i> สร้างคอร์สใหม่
                    </button>
                    <button id="updateBtn" class="btn-action btn-update" style="flex: 1; display: none;">
                         อัปเดตข้อมูลคอร์ส
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function () {
            const userData = localStorage.getItem("user");
            if (!userData) {
                window.location.href = "login.html";
                return;
            }
            const currentUser = JSON.parse(userData);
            const nameDisplay = document.getElementById("navUserName");
            if (nameDisplay) {
                nameDisplay.innerText = (currentUser.name || "Member");
            }
            if (currentUser.role === "instructor") {
                const panel = document.getElementById("instructorPanel");
                if (panel) panel.style.display = "block";
            }
            if (typeof loadCourse === "function") {
                loadCourse();
            }
        };

        function logout() {
            Swal.fire({
                title: 'ออกจากระบบ?',
                text: "คุณต้องการออกจากระบบใช่หรือไม่",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ff7675',
                cancelButtonColor: '#95a5a6',
                confirmButtonText: 'ยืนยัน',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem("user");
                    window.location.href = "login.html";
                }
            });
        }

        function prepareEditCourse(id, title, description) {
            document.getElementById("title").value = title;
            document.getElementById("description").value = description;
            document.querySelector("button[onclick='createCourse()']").style.display = "none";
            const updateBtn = document.getElementById("updateBtn");
            updateBtn.style.display = "block";
            updateBtn.onclick = () => saveCourseUpdate(id);
            document.getElementById("instructorPanel").scrollIntoView({ behavior: 'smooth' });
        }

        function saveCourseUpdate(id) {
            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;
            if (!title || !description) {
                Swal.fire('กรุณากรอกข้อมูลให้ครบ', '', 'warning');
                return;
            }
            fetch(`http://localhost:3000/api/courses/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title, description })
            })
                .then(res => res.json())
                .then(() => {
                    Swal.fire('สำเร็จ!', 'แก้ไขคอร์สเรียบร้อยแล้ว', 'success').then(() => {
                        location.reload();
                    });
                })
                .catch(err => Swal.fire('Error', 'ไม่สามารถแก้ไขได้', 'error'));
        }
    </script>
</body>

</html>
